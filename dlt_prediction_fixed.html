<!DOCTYPE html>

<title>彩票智能预测系统 v2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#0f1923;color:#e0e0e0;min-height:100vh}
.container{max-width:1100px;margin:0 auto;padding:16px}
.nav-bar{display:flex;margin-bottom:20px;border-radius:12px;overflow-x:auto;overflow-y:hidden;background:#1a2a3a;border:1px solid #2a4a6a;scroll-snap-type:x proximity;-webkit-overflow-scrolling:touch}

.nav-btn{flex:0 0 auto;min-width:92px;padding:14px 12px;text-align:center;cursor:pointer;font-size:15px;font-weight:600;color:#667788;border:none;background:transparent;transition:all .2s;white-space:nowrap;scroll-snap-align:start}
.nav-btn:hover{color:#8899aa;background:rgba(255,107,53,.05)}
.nav-btn.active{color:#ff6b35;background:rgba(255,107,53,.1);box-shadow:inset 0 -2px 0 #ff6b35}

.header{text-align:center;padding:16px 0}
.header h1{font-size:24px;color:#ff6b35}

.ccard{background:linear-gradient(135deg,#1a2a3a,#1e3348);border:1px solid #2a4a6a;border-radius:16px;padding:20px 12px;text-align:center;margin-bottom:16px;position:relative;overflow:visible}
.ccard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#ff6b35,#ffa500)}
.cl{font-size:12px;color:#8899aa;letter-spacing:2px}
.cp{font-size:36px;font-weight:bold;color:#ffa500;margin:4px 0}
.ct{font-size:40px;font-weight:bold;color:#fff;font-variant-numeric:tabular-nums}
.ct .unit{font-size:13px;color:#8899aa;margin:0 2px}
.cd{font-size:12px;color:#667788;margin-top:6px}
.cpred{margin-top:12px;padding:10px 4px 4px;border-top:1px solid #2a4a6a}
.cpred-t{font-size:11px;color:#667788;margin-bottom:5px}
.cball{display:inline-block;width:24px;height:24px;line-height:24px;border-radius:50%;text-align:center;font-weight:bold;font-size:11px;margin:0 1px;color:#fff;flex:0 0 24px}
.cball.f{background:linear-gradient(135deg,#ff6b35,#ff4500)}
.cball.b{background:linear-gradient(135deg,#3b82f6,#1d4ed8)}

.pred-line{display:flex;align-items:center;justify-content:center;gap:2px;flex-wrap:nowrap;margin:5px 0;padding:5px 3px;border-radius:8px;background:rgba(15,25,35,.42);overflow-x:auto;white-space:nowrap}
.pred-name{font-size:10px;color:#88aacc;min-width:32px;text-align:right;flex:0 0 32px}
.copy-btn,.expand-btn{padding:2px 6px;border:1px solid #2a4a6a;border-radius:10px;background:#1e3348;color:#88aacc;font-size:10px;cursor:pointer;white-space:nowrap;flex:0 0 auto}
.copy-btn:hover,.expand-btn:hover{border-color:#ff6b35;color:#ffa500}
.pred-detail{display:none;background:#132231!important}
.pred-detail.show{display:table-row}
.pred-detail-box{padding:10px;background:#0f1923;border-radius:8px}
.cpred .cpred-m{display:none}
.irow{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.irow .sbox{flex:1;min-width:110px;background:#1a2a3a;border:1px solid #2a4a6a;border-radius:10px;padding:14px;text-align:center}
.sbox .sv{font-size:24px;font-weight:bold;color:#ffa500}
.sbox .sl{font-size:11px;color:#667788;margin-top:2px}
.pcard{background:linear-gradient(135deg,#1a1a2e,#16213e);border:2px solid #ff6b35;border-radius:16px;padding:20px;margin-bottom:16px}
.pcard-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px}
.pcard-t{font-size:16px;color:#ffa500;font-weight:bold}
.pcard-r{font-size:13px;color:#ff6b35}
.acard{background:#1a2a3a;border:1px solid #2a4a6a;border-radius:12px;padding:16px;margin-bottom:16px}
.ag{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.ai{text-align:center;padding:10px;background:#1e3348;border-radius:8px}
.av{font-size:22px;font-weight:bold;color:#ffa500}
.al{font-size:10px;color:#667788;margin-top:1px}
.st{font-size:15px;color:#ff6b35;margin:16px 0 10px;padding-left:10px;border-left:3px solid #ff6b35;display:flex;align-items:center;gap:8px}
.badge{font-size:10px;background:#2a4a6a;color:#88aacc;padding:2px 8px;border-radius:10px}
.tw{overflow-x:auto;background:#1a2a3a;border:1px solid #2a4a6a;border-radius:10px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#1e3348;color:#88aacc;padding:8px;text-align:center;font-weight:600;font-size:11px;white-space:nowrap}
td{padding:7px 8px;text-align:center;border-bottom:1px solid #1e3348;white-space:nowrap}
tr:hover td{background:rgba(255,107,53,.05)}
.nball{display:inline-block;width:26px;height:26px;line-height:26px;border-radius:50%;text-align:center;font-weight:bold;font-size:12px;margin:0 1px}
.nball.f{background:#ff6b35;color:#fff}
.nball.b{background:#3b82f6;color:#fff}
.pball{display:inline-block;width:24px;height:24px;line-height:24px;border-radius:50%;text-align:center;font-weight:bold;font-size:11px;margin:0 1px;color:#fff}

.isep{color:#3b82f6;font-weight:bold;font-size:16px}
.btn{padding:8px 20px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
.btn-o{background:#ff6b35;color:#fff}.btn-o:hover{background:#ff8c00}
.rand-card{background:#1a2a3a;border:1px solid #2a4a6a;border-radius:12px;padding:14px;margin-bottom:16px}
.rand-head{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.rand-title{font-size:15px;color:#ff6b35;font-weight:700}
.rand-ctrl{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.rand-ctrl input{width:64px;padding:7px;border:1px solid #2a4a6a;background:#0f1923;color:#fff;border-radius:8px;text-align:center}
.rand-out{display:flex;flex-direction:column;gap:6px}
.rand-line{display:flex;align-items:center;gap:3px;flex-wrap:nowrap;overflow-x:auto;white-space:nowrap;background:#0f1923;border-radius:8px;padding:6px}
.rand-idx{color:#88aacc;font-size:11px;min-width:28px}
.lot-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-bottom:16px}
.lot-card{background:linear-gradient(135deg,#1a2a3a,#1e3348);border:1px solid #2a4a6a;border-radius:14px;padding:14px}
.lot-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:8px}
.lot-name{font-size:16px;color:#ffa500;font-weight:700}
.lot-type{font-size:10px;color:#88aacc;background:#132231;border-radius:10px;padding:2px 8px}
.lot-desc{font-size:11px;color:#667788;margin-bottom:8px}
.lot-line{display:flex;align-items:center;gap:3px;flex-wrap:nowrap;overflow-x:auto;white-space:nowrap;background:#0f1923;border-radius:8px;padding:6px;margin:5px 0}
.lot-idx{font-size:10px;color:#88aacc;min-width:28px}
.lot-tag{display:inline-block;min-width:24px;height:24px;line-height:24px;border-radius:6px;text-align:center;background:#2a4a6a;color:#fff;font-size:11px;font-weight:700;margin:0 1px}
.rule-card{background:#1a2a3a;border:1px solid #2a4a6a;border-radius:12px;margin-bottom:8px;overflow:hidden}
.rule-head{padding:12px 14px;color:#ffa500;font-weight:700;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.rule-body{display:none;padding:0 14px 12px;color:#8899aa;font-size:12px;line-height:1.6}
.rule-card.open .rule-body{display:block}
.placeholder{background:#1a2a3a;border:2px dashed #2a4a6a;border-radius:16px;padding:60px 20px;text-align:center}
.placeholder h2{font-size:22px;color:#ffa500;margin-bottom:8px}
.placeholder p{color:#667788;font-size:14px}
.ft{text-align:center;padding:20px 0;font-size:11px;color:#445566}
.fstat{font-size:10px;color:#fbbf24;margin-top:4px}
.sync-btn{margin-left:8px;padding:3px 10px;border:1px solid #ff6b35;border-radius:12px;background:rgba(255,107,53,.12);color:#ffa500;font-size:10px;font-weight:600;cursor:pointer}
.sync-btn:hover{background:rgba(255,107,53,.22);color:#fff}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.pulse{animation:pulse 2s infinite}

/* === 三角洲计算器暗色主题 === */
.dcard{background:linear-gradient(135deg,#1a2a3a,#1e3348);border:1px solid #2a4a6a;border-radius:16px;padding:20px;margin-bottom:16px}
.dcard-h{background:linear-gradient(135deg,#7c3aed,#5b21b6);border-radius:12px;padding:16px;text-align:center;color:#fff;margin-bottom:16px}
.dcard-h h2{font-size:20px;color:#fff;margin-bottom:4px}
.dcard-h p{font-size:12px;opacity:.8}
.dsec{margin-bottom:16px}
.dsec-t{font-size:14px;color:#ffa500;font-weight:600;margin-bottom:10px;padding-left:8px;border-left:3px solid #7c3aed;display:flex;align-items:center;gap:6px}
.drow{display:flex;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.ditem{flex:1;min-width:130px}
.ditem label{display:block;font-size:11px;color:#8899aa;margin-bottom:3px}
.ditem input{width:100%;padding:9px 10px;border:1px solid #2a4a6a;background:#0f1923;color:#e0e0e0;border-radius:8px;font-size:14px;text-align:center}
.ditem input:focus{outline:none;border-color:#7c3aed}
.dcat{background:#1a2a3a;border:1px solid #2a4a6a;border-radius:10px;padding:14px;margin-bottom:12px}
.dbtns{display:flex;gap:10px;margin-top:16px}
.dbtn{flex:1;padding:12px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.dbtn-p{background:linear-gradient(135deg,#7c3aed,#5b21b6);color:#fff}.dbtn-p:hover{background:linear-gradient(135deg,#8b5cf6,#6d28d9)}
.dbtn-s{background:#2a4a6a;color:#8899aa}.dbtn-s:hover{background:#3a5a7a;color:#fff}
.dres{background:#1a2a3a;border:1px solid #7c3aed;border-radius:10px;padding:16px}
.dri{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px dashed #2a4a6a;font-size:13px}
.dri:last-child{border-bottom:none;border-top:2px solid #7c3aed;margin-top:6px;padding-top:12px}
.drl{color:#8899aa}.drv{color:#ffa500;font-weight:700}
.dri:last-child .drl{color:#fff;font-size:15px}.dri:last-child .drv{color:#ffa500;font-size:18px}
.ddet{background:#0f1923;border-radius:8px;padding:12px;margin-top:12px;max-height:120px;overflow-y:auto;font-size:12px;color:#667788;line-height:1.5;font-family:monospace}
@media(max-width:768px){.ct{font-size:28px}.cp{font-size:24px}.ccard{padding:18px 6px}.cpred{padding-left:0;padding-right:0}.cball{width:19px;height:19px;line-height:19px;font-size:9px;flex-basis:19px}.pred-name{min-width:28px;flex-basis:28px}.copy-btn{padding:2px 4px;font-size:9px}.cpred-m{font-size:9px}}
</style>
</head>
<body>
<div class="container">

<div class="dcard">
<div class="dcard-h">
<h2>◆ 三角洲游戏币计算器</h2>
<p>快速计算游戏商品总价值，支持纯币、子弹和防具计算</p>
</div>
<div style="display:flex;flex-wrap:wrap;gap:16px">
<div style="flex:2;min-width:280px">
<div class="dsec-t">⊙ 输入参数</div>
<div class="dcat">

<div class="ditem"><label>纯币数量 (M)</label><input type="number" id="dpureCoin" placeholder="例：100" min="0" step="0.01"></div>

<script>
// UTILS
function R(n){return Math.floor(Math.random()*n)+1}
function S(a){return a.reduce(function(s,v){return s+v},0)}
function LP(v,len){v=String(v);while(v.length<len)v='0'+v;return v}
function P(n){return LP(n,2)}
function SF(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}
function GPN(p,k){var s=String(parseInt(p)+1);return k==='ssq'?LP(s,7):LP(s,5)}
function isOnlineMode(){return location.protocol==='http:'||location.protocol==='https:'}
function isAppMode(){return !!window.AndroidSync}

function predict(k,algo){
  var c=CFG[k],fd=freqData(k),nf=[],nb=[];
  for(var i=1;i<=c.fMax;i++)nf.push(i);
  for(var j=1;j<=c.bMax;j++)nb.push(j);
  var bestF=null,bestB=null,bestS=-1e9,rounds=c.fCnt===6?650:780;
  for(var t=0;t<rounds;t++){
    var wf=nf.map(function(x){
      if(algo===0)return fd.fF[x]*1.2+Math.random()*3;
      if(algo===1)return (fd.n-fd.fF[x])*0.7+Math.random()*4;
      if(algo===2)return fd.fF[x]*0.55+Math.random()*5;
      if(algo===3)return fd.fF[x]*0.35+Math.random()*6;
      return fd.fF[x]*0.8+(fd.n-fd.fF[x])*0.25+Math.random()*5;
    });
    var wb=nb.map(function(x){
      if(algo===0)return fd.fB[x]*1.1+Math.random()*3;
      if(algo===1)return (fd.n-fd.fB[x])*0.7+Math.random()*4;
      if(algo===2)return fd.fB[x]*0.5+Math.random()*5;
      if(algo===3)return fd.fB[x]*0.3+Math.random()*6;
      return fd.fB[x]*0.75+(fd.n-fd.fB[x])*0.25+Math.random()*5;
    });
    var f=pickByWeight(nf,wf,c.fCnt),b=pickByWeight(nb,wb,c.bCnt);
    var odds=f.filter(function(x){return x%2===1}).length;
    var fs=S(f),ideal=(c.fMax+1)*c.fCnt/2,span=f[f.length-1]-f[0];
    var z=[0,0,0];f.forEach(function(x){if(x<=c.zones[0])z[0]++;else if(x<=c.zones[0]+c.zones[1])z[1]++;else z[2]++});
    var sc=0;
    f.forEach(function(x){sc+=fd.fF[x]*(algo===1?-1:2)});b.forEach(function(x){sc+=fd.fB[x]*(algo===1?-1:2)});
    sc-=Math.abs(odds-c.fCnt/2)*(algo===2?20:10);
    sc-=Math.abs(fs-ideal)*(algo===3?0.75:0.25);
    sc-=Math.abs(span-(c.fMax*0.62))*(algo===3?1.8:0.25);
    if(algo===2)sc-=Math.abs(z[0]-z[1])*8+Math.abs(z[1]-z[2])*8;
    if(sc>bestS){bestS=sc;bestF=f.slice();bestB=b.slice()}
  }
  return {f:bestF,b:bestB,algo:algo,name:ALGO_NAMES[algo]};
}
function makeGroups(k){
  var gs=[],seen={};
  for(var i=0;i<5;i++){
    var p=predict(k,i),key=p.f.join(',')+'+'+p.b.join(',');
    var guard=0;
    while(seen[key]&&guard<8){p=predict(k,i);key=p.f.join(',')+'+'+p.b.join(',');guard++}
    seen[key]=1;gs.push(p);
  }
  return gs;
}

// COUNTDOWN
function getNextDraw(c){
  var now=new Date(),dow=now.getDay(),minD=99;
  for(var i=0;i<c.dd.length;i++){
    var diff=(c.dd[i]-dow+7)%7;
    if(diff===0){var dt=new Date(now);dt.setHours(c.dh,c.dm,0,0);if(now>=dt)diff=7}
    if(diff<minD)minD=diff;
  }
  var nd=new Date(now);nd.setDate(nd.getDate()+minD);nd.setHours(c.dh,c.dm,0,0);
  if(now>=nd)nd.setDate(nd.getDate()+7);
  return nd;
}

function updateCD(k){
  var c=CFG[k],next=getNextDraw(c),now=new Date();
  var diff=Math.max(0,Math.floor((next-now)/1000));
  var h=Math.floor(diff/3600),m=Math.floor((diff%3600)/60),s=diff%60;
  var el=document.getElementById(k+'-cd');if(!el)return;
  el.innerHTML=P(h)+'<span class="unit">时</span>'+P(m)+'<span class="unit">分</span>'+P(s)+'<span class="unit">秒</span>';
  var de=document.getElementById(k+'-cdate');if(!de)return;
  var wd=['日','一','二','三','四','五','六'];
  de.textContent=(next.getMonth()+1)+'月'+next.getDate()+'日 周'+wd[next.getDay()]+' '+c.dh+':'+P(c.dm)+'开奖';
}

  }

function renderAcc(k,c,ph){
  var hist=ph.history,total=0,tfh=0,tbh=0,ex=0,gd=0,nm=0,pr=0,best=0,tt=0;
  hist.forEach(function(h){
    if(!h.checked)return;tt++;
    total++;tfh+=h.fh;tbh+=h.bh;
    var th=h.fh+h.bh;best=Math.max(best,th);
    if(th>=c.fCnt+c.bCnt-1)ex++;else if(th>=c.fCnt+c.bCnt-2)gd++;else if(th>=1)nm++;else pr++;
  });
  if(tt>0){
    document.getElementById(k+'-avgf').textContent=(tfh/tt).toFixed(1);
    document.getElementById(k+'-avgb').textContent=(tbh/tt).toFixed(1);
    document.getElementById(k+'-best').textContent=best+'/'+(c.fCnt+c.bCnt);
  }
  var h2=[];
  h2.push('<div class="ag">');
  h2.push('<div class="ai"><div class="av" style="color:#4ade80">'+ex+'</div><div class="al">优(≥'+(c.fCnt+c.bCnt-1)+')</div></div>');
  h2.push('<div class="ai"><div class="av" style="color:#fbbf24">'+gd+'</div><div class="al">良好(≥'+(c.fCnt+c.bCnt-2)+')</div></div>');
  h2.push('<div class="ai"><div class="av" style="color:#fb923c">'+nm+'</div><div class="al">一般(≥1)</div></div>');
  h2.push('<div class="ai"><div class="av" style="color:#f87171">'+pr+'</div><div class="al">差(0)</div></div></div>');
  if(hist.length===0){h2.push('<div style="text-align:center;color:#667788;padding:10px">暂无预测记录</div>');return h2.join('')}
  h2.push('<div class="tw" style="margin-top:10px"><table><thead><tr><th>期号</th><th>预测</th><th>开奖</th><th>'+c.fLabel+'命中</th><th>'+c.bLabel+'命中</th><th>评级</th></tr></thead><tbody>');
  hist.forEach(function(h){
    var th=h.fh+h.bh,badge='',bc='';
    if(th>=c.fCnt+c.bCnt-1){badge='优';bc='good'}
    else if(th>=c.fCnt+c.bCnt-2){badge='良好';bc='good'}
    else if(th>=1){badge='一般';bc='mid'}
    else{badge='差';bc='low'}
    h2.push('<tr><td>'+h.p+'</td><td>');
    h.f.forEach(function(n){h2.push('<span class="pball f">'+P(n)+'</span>')});
    h2.push(' ');
    h.b.forEach(function(n){h2.push('<span class="pball b">'+P(n)+'</span>')});
    h2.push('</td><td>');
    if(h.checked){
      h.af.forEach(function(n){h2.push('<span class="pball f">'+P(n)+'</span>')});
      h2.push(' ');
      h.ab.forEach(function(n){h2.push('<span class="pball b">'+P(n)+'</span>')});
    }else{h2.push('<span style="color:#667788">未开奖</span>')}
    h2.push('</td><td>'+(h.checked?h.fh+'/'+c.fCnt:'-')+'</td><td>'+(h.checked?h.bh+'/'+c.bCnt:'-')+'</td>');
    h2.push('<td><span class="hb '+bc+'">'+badge+'</span></td></tr>');
  });
  h2.push('</tbody></table></div>');
  return h2.join('');
}

// HISTORY STORAGE
function loadH(k){try{return JSON.parse(localStorage.getItem(k+'_hist')||'[]')}catch(e){return[]}}
function saveH(k,h){try{localStorage.setItem(k+'_hist',JSON.stringify(h))}catch(e){}}
function loadP(k){try{var v=JSON.parse(localStorage.getItem(k+'_pending')||'[]');return Array.isArray(v)?v.filter(function(x){return x&&x.p}):[]}catch(e){return[]}}
function saveP(k,p){try{localStorage.setItem(k+'_pending',JSON.stringify(p))}catch(e){}}
function findP(ph,p){for(var i=0;i<ph.pending.length;i++){if(ph.pending[i]&&ph.pending[i].p===p)return ph.pending[i]}return null}
function normalizeEntry(k,e){
  if(!e)e={p:'',groups:[]};
  function ok(g){return g&&Array.isArray(g.f)&&Array.isArray(g.b)&&g.f.length===CFG[k].fCnt&&g.b.length===CFG[k].bCnt}
  var bad=!Array.isArray(e.groups)||e.groups.length!==5;
  if(!bad){for(var gi=0;gi<5;gi++){if(!ok(e.groups[gi])){bad=true;break}}}
  if(bad){
    var old=e.f&&e.b?{f:e.f.slice(),b:e.b.slice(),algo:0,name:ALGO_NAMES[0]}:null;
    e.groups=makeGroups(k);
    if(old){e.groups[0]=old}
  }
  e.groups.forEach(function(g,i){if(!g.name)g.name=ALGO_NAMES[i]||('算法'+(i+1));g.algo=i});
  e.f=e.groups[0].f;e.b=e.groups[0].b;
  return e;
}
function ensurePred(k,p){
  var ph=window._preds[k],entry=findP(ph,p);
  if(entry){normalizeEntry(k,entry);saveP(k,ph.pending);return entry}
  entry={p:p,groups:makeGroups(k),checked:false,fh:0,bh:0};
  normalizeEntry(k,entry);
  ph.pending.push(entry);
  while(ph.pending.length>200)ph.pending.shift();
  saveP(k,ph.pending);
  return entry;
}
function fmtGroup(g){return g.f.map(P).join(' ')+' + '+g.b.map(P).join(' ')}
function predText(k,p,all,idx){
  var e=findP(window._preds[k],p);if(!e)return '';
  normalizeEntry(k,e);
  if(all)return e.p+'期\n'+e.groups.map(function(g,i){return '算法'+(i+1)+' '+g.name+': '+fmtGroup(g)}).join('\n');
  var g=e.groups[idx||0];return e.p+'期 算法'+((idx||0)+1)+' '+g.name+': '+fmtGroup(g);
}
function copyText(t){
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(function(){alert('已复制号码')}).catch(function(){fallbackCopy(t)})}
  else fallbackCopy(t);
}
function fallbackCopy(t){var ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);alert('已复制号码')}
function copyPred(k,p,all,idx){copyText(predText(k,p,all,idx))}

function submitR(k){
  var c=CFG[k],hist=k==='dlt'?DLT_HISTORY:SSQ_HISTORY,f=[],b=[];
  for(var i=0;i<c.fCnt;i++){var v=parseInt(document.getElementById(k+'-inf'+i).value);if(v>=1&&v<=c.fMax)f.push(v)}
  for(var i=0;i<c.bCnt;i++){var v=parseInt(document.getElementById(k+'-inb'+i).value);if(v>=1&&v<=c.bMax)b.push(v)}
  if(f.length!==c.fCnt||b.length!==c.bCnt){alert('请填写完整号码');return}
  if(hasDup(f)||hasDup(b)){alert('号码不能重复');return}
  f.sort(function(a,b){return a-b});b.sort(function(a,b){return a-b});
  var np=GPN(hist[0].p,k);np=prompt('期号',np);if(!np)return;
  var ph=window._preds[k],pending=ph.pending;

function handleLatest(k,d){
  var c=CFG[k],hist=k==='dlt'?DLT_HISTORY:SSQ_HISTORY,ph=window._preds[k];
  if(d&&d.period&&d.front&&d.back){
    if(hist[0].p!==d.period){
      var pending=ph.pending;
      for(var i=0;i<pending.length;i++){
        if(pending[i].p===d.period&&!pending[i].checked){
          pending[i].checked=true;pending[i].af=d.front;pending[i].ab=d.back;
          normalizeEntry(k,pending[i]);
          pending[i].fh=d.front.filter(function(n){return pending[i].f.indexOf(n)>=0}).length;
          pending[i].bh=d.back.filter(function(n){return pending[i].b.indexOf(n)>=0}).length;
          pending[i].cd=d.date||'';ph.history.unshift(pending[i]);saveH(k,ph.history);saveP(k,pending);break;
        }
      }
      hist.unshift({p:d.period,d:d.date||'',f:d.front,b:d.back});
      renderTab(k,c,hist,ph);
    }

function fetchAPI(k){

// DELTA CALCULATOR (no external deps)
function deltaCalc(){
  var c=parseFloat(document.getElementById('dpureCoin').value)||0,r=parseFloat(document.getElementById('dratio').value)||40;
  var awm=parseInt(document.getElementById('dawm').value)||0,awmP=parseFloat(document.getElementById('dawmP').value)||0;
  var red=parseInt(document.getElementById('dred').value)||0,redP=parseFloat(document.getElementById('dredP').value)||0;
  var helm=parseInt(document.getElementById('dhelm').value)||0,helmP=parseFloat(document.getElementById('dhelmP').value)||0;
  var arm=parseInt(document.getElementById('darmor').value)||0,armP=parseFloat(document.getElementById('darmorP').value)||0;
  var pv=c*100/r,aw=awm*awmP,rv=red*redP,hv=helm*helmP,av=arm*armP,tv=pv+aw+rv+hv+av;
  document.getElementById('drPure').textContent=pv.toFixed(2)+' 元';
  document.getElementById('drAWM').textContent=aw.toFixed(2)+' 元';
  document.getElementById('drRed').textContent=rv.toFixed(2)+' 元';
  document.getElementById('drHelm').textContent=hv.toFixed(2)+' 元';
  document.getElementById('drArmor').textContent=av.toFixed(2)+' 元';
  document.getElementById('drTotal').textContent=tv.toFixed(2)+' 元';
  var d='';
  if(c>0)d+='纯币: '+c+'M x 100 / '+r+' = '+pv.toFixed(2)+'元\n';
  if(awm>0)d+='AWM: '+awm+'个 x '+awmP.toFixed(2)+' = '+aw.toFixed(2)+'元\n';
  if(red>0)d+='红弹: '+red+'个 x '+redP.toFixed(2)+' = '+rv.toFixed(2)+'元\n';
  if(helm>0)d+='头盔: '+helm+'个 x '+helmP.toFixed(2)+' = '+hv.toFixed(2)+'元\n';
  if(arm>0)d+='护甲: '+arm+'个 x '+armP.toFixed(2)+' = '+av.toFixed(2)+'元\n';
  if(d)d+='\n总计: '+pv.toFixed(2)+'+'+aw.toFixed(2)+'+'+rv.toFixed(2)+'+'+hv.toFixed(2)+'+'+av.toFixed(2)+'='+tv.toFixed(2)+'元';
  else d='请至少输入一项数据';
  document.getElementById('drDetail').textContent=d;
}

function lotPick(lot){
  if(lot.mode==='balls'){

  }

    var ds=[];for(var i=0;i<lot.len;i++)ds.push(R(10)-1);
    return [{cls:'d',nums:ds}];
  }
  var os=[];for(var j=0;j<lot.cnt;j++)os.push(lot.opts[Math.floor(Math.random()*lot.opts.length)]);
  return [{cls:'o',nums:os}];
}

    if(set.cls==='d')return set.nums.join('');

function lotActualFromData(lot,d){

function switchTab(tab){
  var btns=document.querySelectorAll('.nav-btn');
  for(var i=0;i<btns.length;i++){btns[i].classList.remove('active');if(btns[i].getAttribute('data-tab')===tab)btns[i].classList.add('active')}
  var tabs=document.querySelectorAll('.tab-content');
  for(var j=0;j<tabs.length;j++)tabs[j].classList.remove('active');
  document.getElementById('tab-'+tab).classList.add('active');
}

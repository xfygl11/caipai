<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#0f1923;color:#e0e0e0;min-height:100vh}
.container{max-width:1100px;margin:0 auto;padding:16px}
.nav-bar{display:flex;margin-bottom:20px;border-radius:12px;overflow:hidden;background:#1a2a3a;border:1px solid #2a4a6a}

.tab-content.active{display:block}
.header{text-align:center;padding:16px 0}
.header h1{font-size:24px;color:#ff6b35}
.header .sub{font-size:12px;color:#8899aa;margin-top:2px}
.ccard{background:linear-gradient(135deg,#1a2a3a,#1e3348);border:1px solid #2a4a6a;border-radius:16px;padding:24px;text-align:center;margin-bottom:16px;position:relative;overflow:hidden}
.ccard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#ff6b35,#ffa500)}
.cl{font-size:12px;color:#8899aa;letter-spacing:2px}
.cp{font-size:36px;font-weight:bold;color:#ffa500;margin:4px 0}
.ct{font-size:40px;font-weight:bold;color:#fff;font-variant-numeric:tabular-nums}
.ct .unit{font-size:13px;color:#8899aa;margin:0 2px}
.cd{font-size:12px;color:#667788;margin-top:6px}
.cpred{margin-top:14px;padding:14px 10px 6px;border-top:1px solid #2a4a6a}
.cpred-t{font-size:11px;color:#667788;margin-bottom:6px}
.cball{display:inline-block;width:36px;height:36px;line-height:36px;border-radius:50%;text-align:center;font-weight:bold;font-size:16px;margin:0 2px;color:#fff}
.cball.f{background:linear-gradient(135deg,#ff6b35,#ff4500)}
.cball.b{background:linear-gradient(135deg,#3b82f6,#1d4ed8)}
.cpred-m{font-size:11px;color:#667788;margin-top:5px}
.irow{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}

.sbox .sv{font-size:24px;font-weight:bold;color:#ffa500}
.sbox .sl{font-size:11px;color:#667788;margin-top:2px}
.pcard{background:linear-gradient(135deg,#1a1a2e,#16213e);border:2px solid #ff6b35;border-radius:16px;padding:20px;margin-bottom:16px}

.pcard-r{font-size:13px;color:#ff6b35}
.acard{background:#1a2a3a;border:1px solid #2a4a6a;border-radius:12px;padding:16px;margin-bottom:16px}
.ag{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.ai{text-align:center;padding:10px;background:#1e3348;border-radius:8px}
.av{font-size:22px;font-weight:bold;color:#ffa500}
.al{font-size:10px;color:#667788;margin-top:1px}

.tw{overflow-x:auto;background:#1a2a3a;border:1px solid #2a4a6a;border-radius:10px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#1e3348;color:#88aacc;padding:8px;text-align:center;font-weight:600;font-size:11px;white-space:nowrap}
td{padding:7px 8px;text-align:center;border-bottom:1px solid #1e3348;white-space:nowrap}
tr:hover td{background:rgba(255,107,53,.05)}
.nball{display:inline-block;width:26px;height:26px;line-height:26px;border-radius:50%;text-align:center;font-weight:bold;font-size:12px;margin:0 1px}

.nball.b{background:#3b82f6;color:#fff}

.pball.f{background:#ff6b35}
.pball.b{background:#3b82f6}
.hb{font-size:10px;padding:2px 6px;border-radius:6px}
.hb.good{background:rgba(34,197,94,.2);color:#4ade80}

.ig{display:flex;gap:10px;align-items:center;justify-content:center;flex-wrap:wrap}
.ig input{width:40px;height:40px;border:2px solid #2a4a6a;background:#0f1923;color:#fff;border-radius:8px;text-align:center;font-size:15px;font-weight:bold}
.ig input:focus{outline:none;border-color:#ff6b35}
.isep{color:#3b82f6;font-weight:bold;font-size:16px}
.btn{padding:8px 20px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
.btn-o{background:#ff6b35;color:#fff}.btn-o:hover{background:#ff8c00}
.placeholder{background:#1a2a3a;border:2px dashed #2a4a6a;border-radius:16px;padding:60px 20px;text-align:center}

.placeholder p{color:#667788;font-size:14px}
.ft{text-align:center;padding:20px 0;font-size:11px;color:#445566}
.fstat{font-size:10px;color:#fbbf24;margin-top:4px}
.sync-btn{margin-left:8px;padding:3px 10px;border:1px solid #ff6b35;border-radius:12px;background:rgba(255,107,53,.12);color:#ffa500;font-size:10px;font-weight:600;cursor:pointer}

function predict(k){
  var c=CFG[k],hist=k==='dlt'?DLT_HISTORY:SSQ_HISTORY;
  var fF=new Array(c.fMax+1).fill(0),fB=new Array(c.bMax+1).fill(0);
  var n=Math.min(hist.length,40);
  for(var i=0;i<n;i++){var r=hist[i];r.f.forEach(function(x){fF[x]++});r.b.forEach(function(x){fB[x]++})}
  var bestF=null,bestB=null,bestS=-1e9;
  var nf=[],nb=[];
  for(var i=1;i<=c.fMax;i++)nf.push(i);
  for(var i=1;i<=c.bMax;i++)nb.push(i);
  var rounds=c.fCnt===6?5000:6000;
  for(var t=0;t<rounds;t++){
    var wf=nf.map(function(x){return fF[x]*0.4+Math.random()*3});
    var pool=nf.slice().sort(function(a,b){return wf[b-1]-wf[a-1]}).slice(0,c.fCnt===6?20:15);
    SF(pool);
    var f=pool.slice(0,c.fCnt).sort(function(a,b){return a-b});
    var wb=nb.map(function(x){return fB[x]*0.3+Math.random()*4});
    var bpool=nb.slice().sort(function(a,b){return wb[b-1]-wb[a-1]}).slice(0,5);
    SF(bpool);
    var b=bpool.slice(0,c.bCnt).sort(function(a,b){return a-b});
    var sc=0;
    f.forEach(function(x){sc+=fF[x]*3});b.forEach(function(x){sc+=fB[x]*3});
    var odds=f.filter(function(x){return x%2===1}).length;
    sc-=Math.abs(odds-c.fCnt/2)*12;
    var fs=S(f),ideal=(c.fMax+1)*c.fCnt/2;
    sc-=Math.abs(fs-ideal)*0.3;
    if(sc>bestS){bestS=sc;bestF=f.slice();bestB=b.slice()}
  }
  return {f:bestF,b:bestB};
}

// COUNTDOWN
function getNextDraw(c){
  var now=new Date(),dow=now.getDay(),minD=99;
  for(var i=0;i<c.dd.length;i++){
    var diff=(c.dd[i]-dow+7)%7;
    if(diff===0){var dt=new Date(now);dt.setHours(c.dh,c.dm,0,0);if(now>=dt)diff=7}
    if(diff<minD)minD=diff;
  }
  var nd=new Date(now);nd.setDate(nd.getDate()+minD);nd.setHours(c.dh,c.dm,0,0);
  if(now>=nd)nd.setDate(nd.getDate()+7);
  return nd;
}

function updateCD(k){
  var c=CFG[k],next=getNextDraw(c),now=new Date();
  var diff=Math.max(0,Math.floor((next-now)/1000));
  var h=Math.floor(diff/3600),m=Math.floor((diff%3600)/60),s=diff%60;
  var el=document.getElementById(k+'-cd');if(!el)return;
  el.innerHTML=P(h)+'<span class="unit">时</span>'+P(m)+'<span class="unit">分</span>'+P(s)+'<span class="unit">秒</span>';
  var de=document.getElementById(k+'-cdate');if(!de)return;
  var wd=['日','一','二','三','四','五','六'];
  de.textContent=(next.getMonth()+1)+'月'+next.getDate()+'日 周'+wd[next.getDay()]+' '+c.dh+':'+P(c.dm)+'开奖';
}

  var h2=[];
  h2.push('<div class="ag">');
  h2.push('<div class="ai"><div class="av" style="color:#4ade80">'+ex+'</div><div class="al">优(≥'+(c.fCnt+c.bCnt-1)+')</div></div>');
  h2.push('<div class="ai"><div class="av" style="color:#fbbf24">'+gd+'</div><div class="al">良好(≥'+(c.fCnt+c.bCnt-2)+')</div></div>');
  h2.push('<div class="ai"><div class="av" style="color:#fb923c">'+nm+'</div><div class="al">一般(≥1)</div></div>');
  h2.push('<div class="ai"><div class="av" style="color:#f87171">'+pr+'</div><div class="al">差(0)</div></div></div>');
  if(hist.length===0){h2.push('<div style="text-align:center;color:#667788;padding:10px">暂无预测记录</div>');return h2.join('')}
  h2.push('<div class="tw" style="margin-top:10px"><table><thead><tr><th>期号</th><th>预测</th><th>开奖</th><th>'+c.fLabel+'命中</th><th>'+c.bLabel+'命中</th><th>评级</th></tr></thead><tbody>');
  hist.forEach(function(h){
    var th=h.fh+h.bh,badge='',bc='';
    if(th>=c.fCnt+c.bCnt-1){badge='优';bc='good'}
    else if(th>=c.fCnt+c.bCnt-2){badge='良好';bc='good'}
    else if(th>=1){badge='一般';bc='mid'}
    else{badge='差';bc='low'}
    h2.push('<tr><td>'+h.p+'</td><td>');
    h.f.forEach(function(n){h2.push('<span class="pball f">'+P(n)+'</span>')});
    h2.push(' ');
    h.b.forEach(function(n){h2.push('<span class="pball b">'+P(n)+'</span>')});
    h2.push('</td><td>');
    if(h.checked){
      h.af.forEach(function(n){h2.push('<span class="pball f">'+P(n)+'</span>')});
      h2.push(' ');
      h.ab.forEach(function(n){h2.push('<span class="pball b">'+P(n)+'</span>')});
    }else{h2.push('<span style="color:#667788">未开奖</span>')}
    h2.push('</td><td>'+(h.checked?h.fh+'/'+c.fCnt:'-')+'</td><td>'+(h.checked?h.bh+'/'+c.bCnt:'-')+'</td>');
    h2.push('<td><span class="hb '+bc+'">'+badge+'</span></td></tr>');
  });
  h2.push('</tbody></table></div>');
  return h2.join('');
}

// HISTORY STORAGE
function loadH(k){try{return JSON.parse(localStorage.getItem(k+'_hist')||'[]')}catch(e){return[]}}
function saveH(k,h){try{localStorage.setItem(k+'_hist',JSON.stringify(h))}catch(e){}}
function loadP(k){try{return JSON.parse(localStorage.getItem(k+'_pending')||'[]')}catch(e){return[]}}
function saveP(k,p){try{localStorage.setItem(k+'_pending',JSON.stringify(p))}catch(e){}}
function findP(ph,p){for(var i=0;i<ph.pending.length;i++){if(ph.pending[i].p===p)return ph.pending[i]}return null}
function ensurePred(k,p){
  var ph=window._preds[k],entry=findP(ph,p);
  if(entry)return entry;
  var pred=predict(k);
  entry={p:p,f:pred.f,b:pred.b,checked:false,fh:0,bh:0};
  ph.pending.push(entry);
  while(ph.pending.length>200)ph.pending.shift();
  saveP(k,ph.pending);
  return entry;
}

// MANUAL SUBMIT
function submitR(k){
  var c=CFG[k],hist=k==='dlt'?DLT_HISTORY:SSQ_HISTORY,f=[],b=[];
  for(var i=0;i<c.fCnt;i++){var v=parseInt(document.getElementById(k+'-inf'+i).value);if(v>=1&&v<=c.fMax)f.push(v)}
  for(var i=0;i<c.bCnt;i++){var v=parseInt(document.getElementById(k+'-inb'+i).value);if(v>=1&&v<=c.bMax)b.push(v)}
  if(f.length!==c.fCnt||b.length!==c.bCnt){alert('请填写完整号码');return}
  if(new Set(f).size!==f.length||new Set(b).size!==b.length){alert('号码不能重复');return}
  f.sort(function(a,b){return a-b});b.sort(function(a,b){return a-b});
  var np=GPN(hist[0].p,k);np=prompt('期号',np);if(!np)return;
  var ph=window._preds[k],pending=ph.pending;
  for(var i=0;i<pending.length;i++){
    if(pending[i].p===np&&!pending[i].checked){
      pending[i].checked=true;pending[i].af=f;pending[i].ab=b;
      pending[i].fh=f.filter(function(n){return pending[i].f.indexOf(n)>=0}).length;
      pending[i].bh=b.filter(function(n){return pending[i].b.indexOf(n)>=0}).length;
      pending[i].cd=new Date().toISOString().split('T')[0];
      ph.history.unshift(pending[i]);saveH(k,ph.history);saveP(k,pending);break;
    }
  }
  renderTab(k,c,hist,ph);alert(c.name+' '+np+' 期已录入');
}

// TOGGLE FULL HISTORY
function toggleH(k){
  var el=document.getElementById(k+'-hist'),hist=k==='dlt'?DLT_HISTORY:SSQ_HISTORY;
  if(el.style.display==='none'||el.style.display===''){
    var h=['<div class="tw"><table><thead><tr><th>期号</th><th>日期</th><th>号码</th><th>和值</th></tr></thead><tbody>'];
    hist.forEach(function(r){
      h.push('<tr><td>'+r.p+'</td><td>'+r.d+'</td><td>');
      r.f.forEach(function(n){h.push('<span class="nball f">'+P(n)+'</span>')});
      h.push(' ');
      r.b.forEach(function(n){h.push('<span class="nball b">'+P(n)+'</span>')});
      h.push('</td><td>'+S(r.f)+'</td></tr>');
    });
    h.push('</tbody></table></div>');
    el.innerHTML=h.join('');el.style.display='block';
  }else{el.style.display='none'}
}

function applyLatest(k,d){
  var c=CFG[k],hist=k==='dlt'?DLT_HISTORY:SSQ_HISTORY,ph=window._preds[k];
  if(d&&d.period&&d.front&&d.back){
    if(hist[0].p!==d.period){
      var pending=ph.pending;
      for(var i=0;i<pending.length;i++){
        if(pending[i].p===d.period&&!pending[i].checked){
          pending[i].checked=true;pending[i].af=d.front;pending[i].ab=d.back;
          pending[i].fh=d.front.filter(function(n){return pending[i].f.indexOf(n)>=0}).length;
          pending[i].bh=d.back.filter(function(n){return pending[i].b.indexOf(n)>=0}).length;
          pending[i].cd=d.date||'';ph.history.unshift(pending[i]);saveH(k,ph.history);saveP(k,pending);break;
        }
      }
      hist.unshift({p:d.period,d:d.date||'',f:d.front,b:d.back});
      renderTab(k,c,hist,ph);
    }
    var fs=document.getElementById(k+'-fs');if(fs){fs.textContent='已同步';fs.style.color='#4ade80'}
  }else{
    var fs2=document.getElementById(k+'-fs');if(fs2){fs2.textContent='无新数据';fs2.style.color='#667788'}
  }
}

// SYNC / LOCAL / APP MODE
function fetchAPI(k){
  var c=CFG[k],hist=k==='dlt'?DLT_HISTORY:SSQ_HISTORY,ph=window._preds[k];
  if(isAppMode()){
    var fs=document.getElementById(k+'-fs');if(fs){fs.textContent='同步中...';fs.style.color='#fbbf24'}
    try{
      var raw=AndroidSync.fetchLatest(k);
      var data=JSON.parse(raw||'[]');
      applyLatest(k,Array.isArray(data)?data[0]:data);
    }catch(e){
      fs=document.getElementById(k+'-fs');if(fs){fs.textContent='同步失败，请检查网络';fs.style.color='#f87171'}
    }
    return;
  }
  if(!isOnlineMode()){
    renderTab(k,c,hist,ph);
    var localFs=document.getElementById(k+'-fs');
    if(localFs){localFs.textContent='本地数据已刷新';localFs.style.color='#4ade80'}
    return;
  }
  var webFs=document.getElementById(k+'-fs');if(webFs){webFs.textContent='同步中...';webFs.style.color='#fbbf24'}
  fetch(CFG[k].api).then(function(r){return r.json()}).then(function(data){
    applyLatest(k,Array.isArray(data)?data[0]:data);
  }).catch(function(e){webFs=document.getElementById(k+'-fs');if(webFs){webFs.textContent='同步失败，请检查服务';webFs.style.color='#f87171'}});
}

// TAB SWITCH
function switchTab(tab){
  var btns=document.querySelectorAll('.nav-btn');
  btns.forEach(function(b){b.classList.remove('active')});
  if(tab==='dlt')btns[0].classList.add('active');
  else if(tab==='ssq')btns[1].classList.add('active');
  else btns[2].classList.add('active');
  var tabs=document.querySelectorAll('.tab-content');
  tabs.forEach(function(t){t.classList.remove('active')});
  document.getElementById('tab-'+tab).classList.add('active');
}

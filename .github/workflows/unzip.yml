name: 自动解压ZIP文件到根目录

on:
  push:
    paths:
      - '*.zip'

jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: 查找ZIP文件并解压到根目录
        run: |
          # 查找所有ZIP文件（这里我们假设只有一个，如果有多个，每个都会解压到当前目录）
          for zipfile in *.zip; do
            if [ -f &quot;$zipfile&quot; ]; then
              echo &quot;正在解压: $zipfile&quot;
              # 直接解压到当前目录
              unzip -o &quot;$zipfile&quot;
              # 解压完成后，可以选择删除原ZIP文件以保持仓库清洁，如果不需要删除，则注释掉下面一行
              # rm &quot;$zipfile&quot;
            fi
          done

      - name: 提交解压后的文件
        run: |
          git config --local user.email &quot;action@github.com&quot;
          git config --local user.name &quot;GitHub Action&quot;
          git add .
          # 如果没有文件变化，commit会失败，所以我们允许失败
          git commit -m &quot;自动解压ZIP文件到根目录 [skip ci]&quot; || exit 0
          git push

name: Build Android APK

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "*.md"
      - ".gitignore"
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-34 build-tools;34.0.0 platform-tools"

      - name: Build Debug APK
        id: build
        run: |
          ./gradlew assembleDebug --stacktrace --info 2>&1 | tee build.log
        continue-on-error: true

      - name: Upload build log
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: Check build result
        run: |
          if grep -q 'BUILD SUCCESSFUL' build.log; then
            echo "Build succeeded"
          else
            echo "Build failed"
            grep -i 'error\|exception\|failure\|could not\|unable to\|BUILD FAILED' build.log | tail -30 || true
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: personal-assistant-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
        if: success()

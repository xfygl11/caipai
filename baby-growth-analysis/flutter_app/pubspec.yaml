name: baby_growth_app
description: 成长印记 - Flutter 移动端应用，AI 驱动宝宝成长记录
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # Networking
  http: ^1.2.1
  dio: ^5.4.3+1
  
  # State Management
  provider: ^6.1.2
  
  # Local Storage
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # AI / Voice
  record: ^5.0.4
  audio_waveforms: ^1.1.0
  record_linux: ^1.2.0  # Force compatible version

dependency_overrides:
  record_linux: ^1.2.0
  
  # Camera / Image
  camera: ^0.11.0+1
  image_picker: ^1.0.7
  
  # Charts
  fl_chart: ^0.68.0
  
  # UI Utilities
  intl: ^0.19.0
  flutter_slidable: ^3.1.1
  shimmer: ^3.0.0
  pull_to_refresh: ^2.0.0
  cached_network_image: ^3.3.1
  
  # Permissions
  permission_handler: ^11.3.1
  
  # Audio playback
  just_audio: ^0.9.39
  
  # File / Path
  path_provider: ^2.1.3
  path: ^1.9.0
  
  # Markdown rendering
  flutter_markdown: ^0.7.3+1
  
  # QR Code

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
